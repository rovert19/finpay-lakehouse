resources:
  jobs:
    finpay_ingestion_job:
      name: finpay_ingestion_job
      email_notifications:
        on_failure:
          - eduardo.roberto.rd@gmail.com
      tasks:
        - task_key: Ingestion_job
          pipeline_task:
            pipeline_id:  ${resources.pipelines.pipeline_finpay_etl_pipeline.id}
          max_retries: 2
          min_retry_interval_millis: 1800000
        - task_key: trigger_refresh_job
          depends_on:
            - task_key: Ingestion_job
          run_job_task:
            job_id: ${resources.jobs.finpay_semantic_job.id}
      queue:
        enabled: false
